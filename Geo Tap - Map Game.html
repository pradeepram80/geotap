<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12304e">
<title>Geo Tap</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#0f2233;color:#13243a;overscroll-behavior:none}
  #app{width:100%;margin:0;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#f4f7fb}
  .bar{background:#12304e;color:#fff;padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between}
  .bar h1{font-size:17px;margin:0;font-weight:600}
  .bar .sc{font-size:14px;font-weight:600}
  .screen{flex:1;display:flex;flex-direction:column;min-height:0}
  #home{padding:18px;overflow:auto}
  .lead{color:#39506b;font-size:14px;margin:0 0 14px}
  label.f{display:block;font-size:13px;color:#39506b;margin:14px 0 6px;font-weight:600}
  input.name{width:100%;padding:12px 14px;border:1px solid #cfd9e6;border-radius:12px;font-size:16px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid #cfd9e6;background:#fff;border-radius:20px;padding:9px 14px;font-size:14px;cursor:pointer;color:#1f3b5c}
  .chip.sel{background:#12304e;color:#fff;border-color:#12304e}
  .chip:active{transform:scale(.97)}
  .chip.off{opacity:.4;cursor:not-allowed;background:#eef1f5}
  .chip.off:active{transform:none}
  .actions{display:flex;gap:12px;margin-top:22px}
  .big{flex:1;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer}
  .big.learn{background:#2a9d8f;color:#fff}.big.play{background:#e07a45;color:#fff}
  .big:disabled{opacity:.4}
  .lvlnote{font-size:12px;color:#7488a0;margin-top:4px}
  .guide{font-size:13px;color:#8a5a2b;background:#fff5ec;border:1px solid #f3d9c4;border-radius:10px;padding:9px 12px;margin-top:18px;line-height:1.4}
  .guide.ready{color:#1f6b3a;background:#eef8f0;border-color:#cfe9d5}
  #game,#learn{display:none}
  .clue{background:#fff;margin:10px 12px 6px;padding:13px 16px;border-radius:14px;border:1px solid #e2e8f0;font-size:16px;line-height:1.4;min-height:54px;display:flex;align-items:center}
  .mapwrap{flex:1;min-height:46vh;margin:6px 12px 0;border-radius:14px;overflow:hidden;border:1px solid #bcd3e6;background:#d6e7f3;position:relative;touch-action:none}
  svg{width:100%;height:100%;display:block}
  .land{fill:#eae4d4;stroke:#9aa18c;stroke-width:.5;vector-effect:non-scaling-stroke;stroke-linejoin:round}
  .border{fill:none;stroke:#aeb9c7;stroke-width:.7;vector-effect:non-scaling-stroke;stroke-linejoin:round;pointer-events:none;opacity:.85}
  .hit{fill:transparent;cursor:pointer}
  .pin{fill:#fff;stroke:#e07a45;stroke-width:2.2;vector-effect:non-scaling-stroke;pointer-events:none}
  .pin.correct{fill:#34a853;stroke:#fff}.pin.reveal{fill:#1f6fd6;stroke:#fff}.pin.wrong{fill:#ea4335;stroke:#fff}
  .zoom{position:absolute;left:10px;bottom:10px;display:flex;flex-direction:column;gap:6px;z-index:7}
  @media (max-width:560px){.zoom{top:10px;bottom:auto;left:10px}}
  .zoom button{width:38px;height:38px;border:none;border-radius:10px;background:rgba(18,48,78,.9);color:#fff;font-size:20px;font-weight:600;cursor:pointer}
  .toast{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);background:rgba(18,48,78,.92);color:#fff;padding:8px 14px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:84%;text-align:center}
  .toast.show{opacity:1}
  .confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:9999}
  .confetti i{position:absolute;width:10px;height:15px;border-radius:2px;display:block}
  .compliment{position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);z-index:10000;pointer-events:none;font-size:34px;font-weight:800;text-align:center;max-width:90vw;letter-spacing:.5px;text-shadow:0 2px 0 rgba(0,0,0,.18),0 0 18px rgba(255,255,255,.55)}
  .hintbar{margin:8px 12px 0;background:#eef4fb;border:1px solid #dce7f2;border-radius:12px;padding:9px 12px;font-size:13px;color:#33506e;line-height:1.5}
  .hintbar b{color:#12304e}
  .hintbar .q{font-weight:700;color:#12304e;font-size:15px;margin-bottom:6px;line-height:1.35}
  .info{position:absolute;display:none;top:8px;right:8px;width:300px;max-width:46%;max-height:calc(100% - 16px);overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior:contain;background:#fff;border:1px solid #cdd9e6;border-radius:10px;box-shadow:0 8px 22px rgba(0,0,0,.28);padding:10px 12px;font-size:12.5px;line-height:1.5;color:#33506e;z-index:6}
  @media (max-width:560px){.info{top:auto;bottom:8px;left:8px;right:8px;width:auto;max-width:none;max-height:48%}}
  .info .it{font-weight:700;color:#12304e;font-size:15px;margin-bottom:4px}
  .info .iq{font-size:13.5px;color:#33506e;background:#eef4fb;border:1px solid #dce7f2;border-radius:8px;padding:7px 10px;margin-bottom:6px;line-height:1.4}
  .info .it .tl{color:#12304e;text-decoration:underline;cursor:pointer}
  .info .ans{display:flex;gap:6px;margin:2px 0 6px}
  .info .ans input{flex:1;min-width:0;width:100%;padding:9px 11px;border:2px solid #cfd9e6;border-radius:9px;font-size:15px;color:#13243a}
  .info .ans input:focus{outline:none;border-color:#2a9d8f}
  .info .ans input.bad{border-color:#ea4335;background:#fdecea;animation:shake .4s}
  .info .ansbtn{border:none;border-radius:9px;background:#e07a45;color:#fff;font-weight:700;padding:0 14px;font-size:14px;cursor:pointer;white-space:nowrap}
  .info .trylab{font-size:12px;color:#7488a0;margin:0 0 8px}
  .info .optlab{font-size:12px;color:#7488a0;margin:8px 0 6px;font-weight:600}
  .info .opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 0 4px}
  .info .opt{border:1px solid #c4d2e0;background:#f4f8fc;border-radius:11px;padding:11px 10px;font-size:14px;font-weight:600;color:#16395b;cursor:pointer;text-align:center;line-height:1.2;box-shadow:0 2px 0 #bccbdb;transition:transform .05s,box-shadow .05s}
  .info .opt:hover{background:#eaf2fa}
  .info .opt:active{transform:translateY(2px);box-shadow:0 0 0 #bccbdb}
  .info .opt.bad{border-color:#ea4335;background:#fdecea;color:#b3261e;box-shadow:none;transform:none}
  .info .opt:disabled{cursor:default;box-shadow:none}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}30%,50%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}}
  .info b{color:#12304e}
  .caro{margin:6px 0}
  .caroframe{position:relative;width:100%;height:200px;border-radius:8px;overflow:hidden;background:#eef1f5;display:flex;align-items:center;justify-content:center}
  .caroimg{width:100%;height:100%;object-fit:cover;display:block}
  .carostatus{font-size:12px;color:#8a98a8}
  .carocap{font-size:11px;color:#5b7088;margin-top:4px;line-height:1.35;max-height:46px;overflow:hidden}
  .carodesc{font-size:12px;color:#37506b;margin-top:6px;line-height:1.45;border-top:1px solid #eef1f5;padding-top:6px}
  .cbtn{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border:none;border-radius:50%;background:rgba(18,48,78,.62);color:#fff;font-size:17px;cursor:pointer}
  .cprev{left:6px}.cnext{right:6px}
  .ccount{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.5);color:#fff;font-size:11px;padding:1px 6px;border-radius:10px}
  .wl{color:#1f6fd6;text-decoration:underline;cursor:pointer}
  #wikitip{position:fixed;display:none;width:250px;max-height:240px;overflow:auto;background:#fff;border:1px solid #cdd9e6;border-radius:10px;box-shadow:0 8px 22px rgba(0,0,0,.25);padding:8px 10px;z-index:50;font-size:12px;color:#33506e;pointer-events:auto}
  #wikitip img{width:100%;max-height:120px;object-fit:cover;border-radius:6px;margin-bottom:6px}
  #wikitip .wt{font-weight:700;color:#12304e;margin-bottom:2px}
  .navrow{display:flex;align-items:center;gap:10px;padding:8px 12px 0}
  .navrow .prog{flex:1;text-align:center;font-size:13px;color:#39506b}
  .nav{width:46px;height:40px;border:none;border-radius:11px;background:#e7edf4;color:#12304e;font-size:18px;font-weight:700;cursor:pointer}
  .nav.wide{width:auto;min-width:88px;padding:0 16px;font-size:15px}
  .nav.next{background:#e07a45;color:#fff}
  .nav:disabled{opacity:.35}
  .foot{display:flex;gap:10px;padding:8px 12px calc(env(safe-area-inset-bottom) + 10px)}
  .btn{flex:1;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer}
  .btn.ghost{background:#e7edf4;color:#12304e}.btn.go{background:#e07a45;color:#fff}
  .btn:active{transform:scale(.97)}
  #end{display:none;flex:1;flex-direction:column;min-height:0;padding:18px;overflow:auto}
  #end .stars{font-size:40px;text-align:center;color:#f2a93b}
  #end .scoreBig{font-size:30px;font-weight:700;color:#12304e;text-align:center}
  #end h2{color:#12304e;text-align:center;margin:6px 0}
  #end .lbl{font-weight:600;color:#39506b;margin:16px 0 6px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #e6edf4}
  th{color:#7488a0;font-weight:600;font-size:12px}
  tr.me td{background:#fff7ef;font-weight:600}
  td.r{text-align:right}
  #end .row{display:flex;gap:12px;margin-top:16px}
</style>
</head>
<body>
<div id="app">
  <div class="bar"><h1 id="ttl">Geo Tap</h1><div class="sc" id="score"></div></div>

  <div class="screen" id="home">
    <div class="lead">Read each clue, then type the answer for 5 points — or find it on the map (4, then 3, then 2). Learn first, then play. 3 tries per clue.</div>
    <label class="f">Type your name</label>
    <input class="name" id="nameIn" placeholder="Type your name" maxlength="16">
    <div id="dsWrap" style="display:none"><label class="f">Step 1 — Choose a Map set</label><div class="chips" id="datasets"></div></div>
    <div id="lvlWrap" style="display:none"><label class="f">Step 2 — Choose a Level</label><div class="chips" id="levels"></div><div class="lvlnote" id="lvlnote"></div></div>
    <div id="regWrap" style="display:none"><label class="f">Step 3 — Choose a Region</label><div class="chips" id="regions"></div></div>
    <div id="actWrap" style="display:none">
      <div class="guide" id="guide"></div>
      <div class="actions">
        <button class="big learn" id="learnBtn">① Learn first</button>
        <button class="big play" id="playBtn" style="display:none">② Play</button>
      </div>
    </div>
    <button class="btn ghost" id="boardBtn" style="margin-top:14px;width:100%">View leaderboard</button>
  </div>

  <div class="screen" id="learn">
    <div class="mapwrap" id="lwrap"><svg id="lmap" preserveAspectRatio="xMidYMid meet"><path class="land" id="lland"></path><path class="border" id="lborders"></path><g id="lpins"></g></svg>
      <div class="zoom"><button id="lzin">+</button><button id="lzout">−</button><button id="lzreset">⤢</button></div>
      <div class="info" id="linfo"></div></div>
    <div class="navrow"><button class="nav wide" id="lprev">‹ Prev</button><div class="prog" id="lprog"></div><button class="nav wide next" id="lnext">Next ›</button></div>
    <div class="foot"><button class="btn ghost" id="lmenu">Menu</button><button class="btn ghost" id="lplay">Autoplay</button><button class="btn go" id="lstart">Start game</button></div>
  </div>

  <div class="screen" id="game">
    <div class="mapwrap" id="mapwrap"><svg id="map" preserveAspectRatio="xMidYMid meet"><path class="land" id="land"></path><path class="border" id="borders"></path><g id="pins"></g></svg>
      <div class="zoom"><button id="zin">+</button><button id="zout">−</button><button id="zreset">⤢</button></div>
      <div class="toast" id="toast"></div><div class="info" id="info"></div>
    </div>
    <div class="navrow"><button class="nav" id="prevBtn">◀</button><div class="prog" id="prog"></div><button class="nav" id="nextBtn">▶</button></div>
    <div class="foot"><button class="btn ghost" id="homeBtn">Menu</button></div>
  </div>

  <div class="screen" id="board">
    <div style="padding:18px;overflow:auto;flex:1;display:flex;flex-direction:column">
      <h2 style="color:#12304e;margin:0 0 10px">Leaderboard</h2>
      <table><thead><tr><th>#</th><th>Name</th><th>Set</th><th class="r">Score</th></tr></thead><tbody id="bdBody"></tbody></table>
      <div style="display:flex;gap:12px;margin-top:16px"><button class="btn go" id="bdBack">Back to menu</button><button class="btn ghost" id="bdClear">Clear scores</button></div>
    </div>
  </div>

  <div class="screen" id="end">
    <div class="stars" id="stars"></div><div class="scoreBig" id="endScore"></div><h2 id="endTitle"></h2>
    <div class="lbl">Leaderboard</div>
    <table id="lb"><thead><tr><th>#</th><th>Name</th><th>Set</th><th class="r">Score</th></tr></thead><tbody id="lbBody"></tbody></table>
    <div class="row"><button class="btn go" id="againBtn">Play again</button><button class="btn ghost" id="backBtn">Menu</button></div>
  </div>
</div>
<div id="wikitip"></div>
<script>
const GAMES={"World": {"Easy": [{"c": "Europe", "n": "London", "x": 499.64, "y": 106.92, "clue": "The River Thames winds past the Houses of Parliament and the Tower of London in which capital city, home to Big Ben and Buckingham Palace?", "hint": "<b>Location:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/United_Kingdom\" data-t=\"United Kingdom\">United Kingdom</a><br><b>Man-made Landmarks:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/Big_Ben\" data-t=\"Big Ben\">Big Ben</a>, <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/Tower_Bridge\" data-t=\"Tower Bridge\">Tower Bridge</a>, <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/Buckingham_Palace\" data-t=\"Buckingham Palace\">Buckingham Palace</a><br><b>Geographical Landmarks:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/River_Thames\" data-t=\"River Thames\">River Thames</a><br><b>Interesting Fact:</b> Capital of the UK; the Prime Minister lives at 10 Downing Street"}, {"c": "Europe", "n": "Edinburgh", "x": 491.14, "y": 94.58, "clue": "An extinct volcano known as Arthur's Seat overlooks which Scottish capital, famous for the castle on its crag?", "hint": "<b>Location:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/United_Kingdom\" data-t=\"United Kingdom\">United Kingdom</a><br><b>Man-made Landmarks:</b> This place Castle<br><b>Geographical Landmarks:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/Arthur%27s_Seat\" data-t=\"Arthur's Seat\">Arthur's Seat (extinct volcano)</a><br><b>Interesting Fact:</b> Capital of Scotland"}, {"c": "Europe", "n": "Paris", "x": 506.53, "y": 114.28, "clue": "The glass pyramid of the Louvre, guarding the Mona Lisa, stands by the Seine in which capital crowned by the Eiffel Tower?", "hint": "<b>Location:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/France\" data-t=\"France\">France</a><br><b>Man-made Landmarks:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/Eiffel_Tower\" data-t=\"Eiffel Tower\">Eiffel Tower</a>, <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/Louvre\" data-t=\"Louvre\">Louvre</a>, <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/Notre-Dame\" data-t=\"Notre-Dame\">Notre-Dame</a><br><b>Geographical Landmarks:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/Seine_River\" data-t=\"Seine River\">Seine River</a><br><b>Interesting Fact:</b> The Louvre holds the Mona Lisa; capital of France"}, {"c": "Europe", "n": "Marseille", "x": 514.92, "y": 129.72, "clue": "France's oldest port city, on the Mediterranean, is which city?", "hint": "<b>Location:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/France\" data-t=\"France\">France</a><br><b>Man-made Landmarks:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/Old_Port\" data-t=\"Old Port\">Old Port (Vieux-Port)</a><br><b>Geographical Landmarks:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/Mediterranean_Sea\" data-t=\"Mediterranean Sea\">Mediterranean Sea</a><br><b>Interesting Fact:</b> France's oldest and biggest port city"}, {"c": "Europe", "n": "Rome", "x": 534.72, "y": 133.61, "clue": "Vatican City, the world's smallest country, lies entirely inside which capital built on seven hills and home to the Colosseum?", "hint": "<b>Location:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href=\"https://en.wikipedia.org/wiki/Italy\" data-t=\"Italy\">Italy</a><br><b>Man-made Landmarks:</b> <a class=\"wl\" target=\"_blank\" rel=\"noopener\" href= /* Learn map: pinch / drag to zoom and move */
(function(){const lmap=$('lmap'),lwrap=$('lwrap');const P=new Map();let lp=null,pd=0;
  function us(){const r=lmap.getBoundingClientRect();return Math.min(r.width/lvb[2],r.height/lvb[3]);}
  function clampL(){const mx=lbaseVB[2]*1.6,mn=lbaseVB[2]*0.12;lvb[2]=Math.max(mn,Math.min(mx,lvb[2]));lvb[3]=lvb[2]*(lbaseVB[3]/lbaseVB[2]);lvb[0]=Math.max(-60,Math.min(1060-lvb[2],lvb[0]));lvb[1]=Math.max(-40,Math.min(540-lvb[3],lvb[1]));}
  function zoom(cx,cy,f){const r=lmap.getBoundingClientRect();const s=us();const ox=(r.width-lvb[2]*s)/2,oy=(r.height-lvb[3]*s)/2;const wx=lvb[0]+((cx-r.left)-ox)/s,wy=lvb[1]+((cy-r.top)-oy)/s;const fx=(wx-lvb[0])/lvb[2],fy=(wy-lvb[1])/lvb[3];lvb[2]*=f;clampL();lvb[3]=lvb[2]*(lbaseVB[3]/lbaseVB[2]);lvb[0]=wx-fx*lvb[2];lvb[1]=wy-fy*lvb[3];clampL();setLVB();}
  lwrap.addEventListener('wheel',e=>{if(!lvb)return;e.preventDefault();zoom(e.clientX,e.clientY,e.deltaY>0?1.15:0.87);},{passive:false});
  lwrap.addEventListener('pointerdown',e=>{P.set(e.pointerId,e);lp={x:e.clientX,y:e.clientY};learnMoved=false;if(P.size===2){const p=[...P.values()];pd=Math.hypot(p[0].clientX-p[1].clientX,p[0].clientY-p[1].clientY);}});
  lwrap.addEventListener('pointermove',e=>{if(!P.has(e.pointerId)||!lvb)return;P.set(e.pointerId,e);
    if(P.size===2){const p=[...P.values()];const d=Math.hypot(p[0].clientX-p[1].clientX,p[0].clientY-p[1].clientY);if(pd&&d){const zf=1+((pd/d)-1)*0.35;zoom((p[0].clientX+p[1].clientX)/2,(p[0].clientY+p[1].clientY)/2,zf);}pd=d;learnMoved=true;return;}
    if(lp){const s=us();if(Math.abs(e.clientX-lp.x)+Math.abs(e.clientY-lp.y)>3)learnMoved=true;lvb[0]-=(e.clientX-lp.x)/s;lvb[1]-=(e.clientY-lp.y)/s;clampL();setLVB();lp={x:e.clientX,y:e.clientY};}});
  function lup(e){P.delete(e.pointerId);if(P.size<2)pd=0;if(P.size===0)lp=null;}
  lwrap.addEventListener('pointerup',lup);lwrap.addEventListener('pointercancel',lup);
  $('lzin').onclick=()=>{const r=lmap.getBoundingClientRect();zoom(r.left+r.width/2,r.top+r.height/2,0.7);};
  $('lzout').onclick=()=>{const r=lmap.getBoundingClientRect();zoom(r.left+r.width/2,r.top+r.height/2,1.4);};
  $('lzreset').onclick=()=>{if(lbaseVB){lvb=lbaseVB.slice();setLVB();}};
})();

show('home');
</script>
</body>
</html>
