<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12304e">
<title>Geo Tap</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#0f2233;color:#13243a;overscroll-behavior:none}
  #app{max-width:980px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:#f4f7fb}
  .bar{background:#12304e;color:#fff;padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between}
  .bar h1{font-size:17px;margin:0;font-weight:600}
  .bar .sc{font-size:14px;font-weight:600}
  .screen{flex:1;display:flex;flex-direction:column;min-height:0}
  /* HOME */
  #home{padding:18px;overflow:auto}
  .lead{color:#39506b;font-size:14px;margin:0 0 14px}
  label.f{display:block;font-size:13px;color:#39506b;margin:14px 0 6px;font-weight:600}
  input.name{width:100%;padding:12px 14px;border:1px solid #cfd9e6;border-radius:12px;font-size:16px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid #cfd9e6;background:#fff;border-radius:20px;padding:9px 14px;font-size:14px;cursor:pointer;color:#1f3b5c}
  .chip.sel{background:#12304e;color:#fff;border-color:#12304e}
  .chip:active{transform:scale(.97)}
  .actions{display:flex;gap:12px;margin-top:22px}
  .big{flex:1;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer}
  .big.learn{background:#2a9d8f;color:#fff}.big.play{background:#e07a45;color:#fff}
  .big:disabled{opacity:.4}
  .lvlnote{font-size:12px;color:#7488a0;margin-top:4px}
  /* GAME / LEARN shared */
  #game,#learn{display:none}
  .clue{background:#fff;margin:10px 12px 6px;padding:13px 16px;border-radius:14px;border:1px solid #e2e8f0;font-size:16px;line-height:1.4;min-height:54px;display:flex;align-items:center}
  .ans{margin:0 12px;color:#2a9d8f;font-weight:700;font-size:15px;min-height:20px}
  .mapwrap{flex:1;min-height:46vh;margin:6px 12px 0;border-radius:14px;overflow:hidden;border:1px solid #bcd3e6;background:#d6e7f3;position:relative;touch-action:none}
  svg{width:100%;height:100%;display:block}
  .land{fill:#eae4d4;stroke:#9aa18c;stroke-width:.5;vector-effect:non-scaling-stroke;stroke-linejoin:round}
  .hit{fill:transparent;cursor:pointer}
  .pin{fill:#fff;stroke:#e07a45;stroke-width:2.2;vector-effect:non-scaling-stroke;pointer-events:none}
  .pin.correct{fill:#34a853;stroke:#fff}
  .pin.reveal{fill:#1f6fd6;stroke:#fff}
  .pin.wrong{fill:#ea4335;stroke:#fff}
  .zoom{position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:6px}
  .zoom button{width:38px;height:38px;border:none;border-radius:10px;background:rgba(18,48,78,.9);color:#fff;font-size:20px;font-weight:600;cursor:pointer}
  .toast{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);background:rgba(18,48,78,.92);color:#fff;padding:8px 14px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:84%;text-align:center}
  .toast.show{opacity:1}
  .hintbar{margin:8px 12px 0;background:#eef4fb;border:1px solid #dce7f2;border-radius:12px;padding:9px 12px;font-size:13px;color:#33506e;line-height:1.4;min-height:20px}
  .hintbar b{color:#12304e}
  .navrow{display:flex;align-items:center;gap:10px;padding:8px 12px 0}
  .navrow .prog{flex:1;text-align:center;font-size:13px;color:#39506b}
  .nav{width:46px;height:40px;border:none;border-radius:11px;background:#e7edf4;color:#12304e;font-size:18px;font-weight:700;cursor:pointer}
  .nav:disabled{opacity:.35}
  .foot{display:flex;gap:10px;padding:8px 12px calc(env(safe-area-inset-bottom) + 10px)}
  .btn{flex:1;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer}
  .btn.ghost{background:#e7edf4;color:#12304e}.btn.go{background:#e07a45;color:#fff}
  .btn:active{transform:scale(.97)}
  /* END */
  #end{display:none;flex:1;flex-direction:column;min-height:0;padding:18px;overflow:auto}
  #end .stars{font-size:40px;text-align:center;color:#f2a93b}
  #end .scoreBig{font-size:30px;font-weight:700;color:#12304e;text-align:center}
  #end h2{color:#12304e;text-align:center;margin:6px 0}
  #end .lbl{font-weight:600;color:#39506b;margin:16px 0 6px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #e6edf4}
  th{color:#7488a0;font-weight:600;font-size:12px}
  tr.me td{background:#fff7ef;font-weight:600}
  td.r{text-align:right}
  #end .row{display:flex;gap:12px;margin-top:16px}
</style>
</head>
<body>
<div id="app">
  <div class="bar"><h1 id="ttl">Geo Tap</h1><div class="sc" id="score"></div></div>

  <div class="screen" id="gate">
    <div style="margin:auto;max-width:320px;width:100%;text-align:center;padding:24px">
      <h2 style="color:#12304e;margin:0 0 6px">Geo Tap</h2>
      <p style="color:#39506b;font-size:14px;margin:0 0 16px">Enter the access code to play.<br>Ask whoever shared this game for the code.</p>
      <input class="name" id="codeIn" placeholder="Access code" style="text-align:center" autocomplete="off">
      <div id="codeErr" style="color:#c0392b;font-size:13px;min-height:18px;margin-top:8px"></div>
      <button class="big play" id="codeBtn" style="margin-top:8px;width:100%">Unlock</button>
    </div>
  </div>

  <div class="screen" id="home">
    <div class="lead">Tap the place on the map that matches each clue. Learn first, then play. Three tries per clue (5 / 4 / 3 points).</div>
    <label class="f">Your name</label>
    <input class="name" id="nameIn" placeholder="Type your name" maxlength="16">
    <label class="f">Level</label>
    <div class="chips" id="levels"></div>
    <div class="lvlnote" id="lvlnote"></div>
    <label class="f">Region</label>
    <div class="chips" id="regions"></div>
    <div class="actions">
      <button class="big learn" id="learnBtn" disabled>Learn first</button>
      <button class="big play" id="playBtn" disabled>Play</button>
    </div>
  </div>

  <div class="screen" id="learn">
    <div class="clue" id="lclue"></div>
    <div class="ans" id="lans"></div>
    <div class="mapwrap" id="lwrap"><svg id="lmap" preserveAspectRatio="xMidYMid meet"><path class="land" id="lland"></path><g id="lpins"></g></svg></div>
    <div class="hintbar" id="lhint"></div>
    <div class="navrow"><button class="nav" id="lprev">◀</button><div class="prog" id="lprog"></div><button class="nav" id="lnext">▶</button></div>
    <div class="foot"><button class="btn ghost" id="lplay">Pause</button><button class="btn go" id="lstart">Start game</button></div>
  </div>

  <div class="screen" id="game">
    <div class="clue" id="clue"></div>
    <div class="mapwrap" id="mapwrap"><svg id="map" preserveAspectRatio="xMidYMid meet"><path class="land" id="land"></path><g id="pins"></g></svg>
      <div class="zoom"><button id="zin">+</button><button id="zout">−</button><button id="zreset">⤢</button></div>
      <div class="toast" id="toast"></div>
    </div>
    <div class="hintbar" id="hint"></div>
    <div class="navrow"><button class="nav" id="prevBtn">◀</button><div class="prog" id="prog"></div><button class="nav" id="nextBtn">▶</button></div>
    <div class="foot"><button class="btn ghost" id="homeBtn">Menu</button></div>
  </div>

  <div class="screen" id="end">
    <div class="stars" id="stars"></div>
    <div class="scoreBig" id="endScore"></div>
    <h2 id="endTitle"></h2>
    <div class="lbl">Leaderboard</div>
    <table id="lb"><thead><tr><th>#</th><th>Name</th><th>Level</th><th>Region</th><th class="r">Score</th></tr></thead><tbody id="lbBody"></tbody></table>
    <div class="row"><button class="btn go" id="againBtn">Play again</button><button class="btn ghost" id="backBtn">Menu</button></div>
  </div>
</div>
<script>
const LEVELS={"Easy": [{"c": "Europe", "n": "London", "x": 499.64, "y": 106.92, "clue": "The River Thames winds past the Houses of Parliament and the Tower of London in which capital city, home to Big Ben and Buckingham Palace?", "hint": "In United Kingdom (Europe). Man-made: Big Ben, Tower Bridge, Buckingham Palace. Geography: River Thames. Capital of the UK; the Prime Minister lives at 10 Downing Street."}, {"c": "Europe", "n": "Edinburgh", "x": 491.14, "y": 94.58, "clue": "An extinct volcano known as Arthur's Seat overlooks which Scottish capital, famous for the castle on its crag?", "hint": "In United Kingdom (Europe). Man-made: This place Castle. Geography: Arthur's Seat (extinct volcano). Capital of Scotland."}, {"c": "Europe", "n": "Paris", "x": 506.53, "y": 114.28, "clue": "The glass pyramid of the Louvre, guarding the Mona Lisa, stands by the Seine in which capital crowned by the Eiffel Tower?", "hint": "In France (Europe). Man-made: Eiffel Tower, Louvre, Notre-Dame. Geography: Seine River. The Louvre holds the Mona Lisa; capital of France."}, {"c": "Europe", "n": "Marseille", "x": 514.92, "y": 129.72, "clue": "France's oldest port city, on the Mediterranean, is which city?", "hint": "In France (Europe). Man-made: Old Port (Vieux-Port). Geography: Mediterranean Sea. France's oldest and biggest port city."}, {"c": "Europe", "n": "Rome", "x": 534.72, "y": 133.61, "clue": "Vatican City, the world's smallest country, lies entirely inside which capital built on seven hills and home to the Colosseum?", "hint": "In Italy (Europe). Man-made: Colosseum, Pantheon. Geography: Tiber River, Seven Hills. Vatican City, the world's smallest country, sits inside this place."}, {"c": "Europe", "n": "Venice", "x": 534.22, "y": 123.78, "clue": "A lagoon city of canals where people travel by boat is which city?", "hint": "In Italy (Europe). Man-made: St. Mark's Basilica. Geography: Venetian Lagoon (Adriatic Sea). A city built on water where people travel by boat."}, {"c": "Europe", "n": "Pisa", "x": 528.89, "y": 128.56, "clue": "A famous bell tower that tilts because it was built on soft ground stands in which Tuscan city on the Arno River?", "hint": "In Italy (Europe). Man-made: Leaning Tower of this place. Geography: Arno River. The tower leans because of soft ground."}, {"c": "Europe", "n": "Berlin", "x": 537.22, "y": 104.11, "clue": "The Brandenburg Gate and remains of a wall that once split the city are found in which German capital on the Spree River?", "hint": "In Germany (Europe). Man-made: Brandenburg Gate, this place Wall remains. Geography: Spree River. Capital of Germany; the Wall once split the city."}, {"c": "Europe", "n": "Munich", "x": 532.17, "y": 116.28, "clue": "Oktoberfest and nearby Neuschwanstein Castle belong to which Bavarian city?", "hint": "In Germany (Europe). Man-made: Neuschwanstein Castle (nearby). Geography: Bavarian Alps. Famous for Oktoberfest."}, {"c": "Europe", "n": "Madrid", "x": 489.72, "y": 137.72, "clue": "The Prado Museum and the Royal Palace sit in which Spanish capital on the Manzanares River?", "hint": "In Spain (Europe). Man-made: Royal Palace, Prado Museum. Geography: Manzanares River. Capital of Spain."}, {"c": "Europe", "n": "Barcelona", "x": 506.03, "y": 135.03, "clue": "Gaudi's Sagrada Familia church rises in which Spanish city?", "hint": "In Spain (Europe). Man-made: Sagrada Família. Geography: Mediterranean Sea coast. The cathedral has been built for over 140 years."}, {"c": "Europe", "n": "Lisbon", "x": 474.64, "y": 142.44, "clue": "The Belem Tower guards the Tagus in which Portuguese capital?", "hint": "In Portugal (Europe). Man-made: Belém Tower. Geography: Tagus River, Atlantic Ocean. Capital of Portugal; a great age-of-exploration port."}, {"c": "Europe", "n": "Athens", "x": 565.92, "y": 144.5, "clue": "The Parthenon crowns the Acropolis in which Greek capital?", "hint": "In Greece (Europe). Man-made: Parthenon (Acropolis). Geography: Aegean Sea, Mt. Lycabettus. Birthplace of democracy and the Olympic Games."}, {"c": "Europe", "n": "Amsterdam", "x": 513.61, "y": 104.53, "clue": "Canals and windmills fill which Dutch capital below sea level?", "hint": "In Netherlands (Europe). Man-made: Canal houses, windmills. Geography: Canals (below sea level). Much of the country is below sea level."}, {"c": "Europe", "n": "Moscow", "x": 604.5, "y": 95.11, "clue": "St. Basil's Cathedral and the Kremlin sit on Red Square in which capital?", "hint": "In Russia (Europe). Man-made: Kremlin, St. Basil's Cathedral, Red Square. Geography: Moskva River. Capital of the largest country in the world."}, {"c": "Europe", "n": "St. Petersburg", "x": 584.28, "y": 83.53, "clue": "Built by Tsar Peter the Great on the Neva River, which Russian city holds the Hermitage and the Winter Palace?", "hint": "In Russia (Europe). Man-made: Hermitage Museum, Winter Palace. Geography: Neva River. Built by Tsar Peter the Great."}, {"c": "Europe", "n": "Vienna", "x": 545.47, "y": 116.08, "clue": "Schonbrunn Palace and classical music belong to which Austrian capital?", "hint": "In Austria (Europe). Man-made: Schönbrunn Palace. Geography: Danube River. Capital of Austria; the 'City of Music'."}, {"c": "Europe", "n": "Zermatt", "x": 521.53, "y": 122.17, "clue": "The pyramid-shaped Matterhorn rises above which Swiss alpine town?", "hint": "In Switzerland (Europe). Man-made: Old City of Bern. Geography: Matterhorn, Swiss Alps. The Matterhorn is a famous pyramid-shaped peak."}, {"c": "Europe", "n": "Dublin", "x": 482.61, "y": 101.81, "clue": "Trinity College sits on the Liffey in which Irish capital?", "hint": "In Ireland (Europe). Man-made: Trinity College, this place Castle. Geography: River Liffey. Capital of Ireland."}, {"c": "Europe", "n": "Brussels", "x": 512.08, "y": 108.75, "clue": "The Atomium and the EU's headquarters are in which Belgian capital?", "hint": "In Belgium (Europe). Man-made: Atomium, Grand Place. Headquarters of the European Union."}, {"c": "Europe", "n": "Oslo", "x": 529.86, "y": 83.58, "clue": "Fjords and a Viking Ship Museum belong to which Norwegian capital?", "hint": "In Norway (Europe). Man-made: Viking Ship Museum. Geography: Fjords, this placefjord. Norway is famous for deep coastal fjords."}, {"c": "Europe", "n": "Stockholm", "x": 550.19, "y": 85.19, "clue": "Spread across 14 islands, which Swedish capital is this?", "hint": "In Sweden (Europe). Man-made: Royal Palace. Geography: Baltic Sea archipelago. Built across 14 islands."}, {"c": "Europe", "n": "Warsaw", "x": 558.36, "y": 104.92, "clue": "The rebuilt Royal Castle stands on the Vistula in which Polish capital?", "hint": "In Poland (Europe). Man-made: Royal Castle. Geography: Vistula River. Capital of Poland."}, {"c": "Europe", "n": "Prague", "x": 540.11, "y": 110.89, "clue": "Charles Bridge and a huge castle overlook the Vltava in which capital?", "hint": "In Czech Republic (Europe). Man-made: Charles Bridge, this place Castle. Geography: Vltava River. This place Castle is one of the largest castles on Earth."}, {"c": "Europe", "n": "Budapest", "x": 552.89, "y": 118.06, "clue": "Buda and Pest meet across the Danube in which Hungarian capital?", "hint": "In Hungary (Europe). Man-made: Hungarian Parliament Building. Geography: Danube River. Two cities, Buda and Pest, joined by the Danube."}, {"c": "Europe", "n": "Vatican City", "x": 534.58, "y": 133.61, "clue": "The Sistine Chapel and St. Peter's Basilica belong to which walled country, the smallest in the world, inside Rome?", "hint": "In Vatican City (Europe). Man-made: St. Peter's Basilica, Sistine Chapel. The smallest country in the world."}, {"c": "Europe", "n": "Copenhagen", "x": 534.92, "y": 95.33, "clue": "The Little Mermaid statue and Tivoli Gardens sit in which Danish capital?", "hint": "In Denmark (Europe). Man-made: The Little Mermaid statue, Tivoli Gardens. Geography: Øresund Strait. Connected to Sweden by a bridge-tunnel."}, {"c": "Europe", "n": "Helsinki", "x": 569.28, "y": 82.86, "clue": "The 'Land of a Thousand Lakes' has which Baltic capital?", "hint": "In Finland (Europe). Man-made: This place Cathedral. Geography: Baltic Sea, thousands of lakes. Called the 'Land of a Thousand Lakes'."}, {"c": "Europe", "n": "Bucharest", "x": 572.5, "y": 126.58, "clue": "The vast Palace of the Parliament stands in which Romanian capital?", "hint": "In Romania (Europe). Man-made: Palace of the Parliament. Geography: Carpathian Mountains, Transylvania. Has one of the world's largest buildings."}, {"c": "Europe", "n": "Sofia", "x": 564.78, "y": 131.39, "clue": "The gold-domed Alexander Nevsky Cathedral rises in which Bulgarian capital?", "hint": "In Bulgaria (Europe). Man-made: Alexander Nevsky Cathedral. Geography: Balkan Mountains. One of Europe's oldest cities."}, {"c": "Europe", "n": "Kyiv", "x": 584.78, "y": 109.86, "clue": "Saint Sophia Cathedral overlooks the Dnieper in which Ukrainian capital?", "hint": "In Ukraine (Europe). Man-made: Saint Sophia Cathedral. Geography: Dnieper River. Largest country entirely within Europe."}, {"c": "Asia", "n": "New Delhi", "x": 714.47, "y": 170.53, "clue": "India Gate and the Red Fort stand in which Indian capital?", "hint": "In India (Asia). Man-made: India Gate, Red Fort, Qutub Minar. Geography: Yamuna River. Capital of India."}, {"c": "Asia", "n": "Agra", "x": 716.78, "y": 174.5, "clue": "The white-marble Taj Mahal, built as a tomb beside the Yamuna River, draws visitors to which Indian city?", "hint": "In India (Asia). Man-made: Taj Mahal. Geography: Yamuna River. A white-marble tomb; one of the New 7 Wonders."}, {"c": "Asia", "n": "Mumbai", "x": 702.44, "y": 197.0, "clue": "The Gateway of India arch faces the Arabian Sea in which Indian city, home of the Bollywood film industry?", "hint": "In India (Asia). Man-made: Gateway of India. Geography: Arabian Sea. India's largest city and film capital (Bollywood)."}, {"c": "Asia", "n": "Beijing", "x": 823.36, "y": 139.17, "clue": "The Forbidden City and the nearby Great Wall belong to whic /* ===== ACCESS CODES =====
   Add as many codes as you like below, comma-separated and in "quotes".
   Anyone who enters ANY one of them can play. Delete a code to revoke it. */
const ACCESS_CODES=["RISHU","SKANDA","VISHI"];
const _codes=ACCESS_CODES.map(c=>String(c).trim().toLowerCase());
function unlocked(){try{return _codes.includes((localStorage.getItem('geotap_unlock')||'').toLowerCase());}catch(e){return false;}}
function tryUnlock(){const v=($('codeIn').value||'').trim().toLowerCase();
  if(_codes.includes(v)){try{localStorage.setItem('geotap_unlock',v);}catch(e){}show('home');}
  else{$('codeErr').textContent='That code is not right. Please try again.';}}
$('codeBtn').onclick=tryUnlock;
$('codeIn').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});

/* ---------- HOME ---------- */
$('nameIn').addEventListener('input',e=>{player=e.target.value.trim();refreshActions();});
const lvlBox=$('levels');
Object.keys(LEVELS).forEach(lv=>{const b=document.createElement('div');b.className='chip';b.textContent=lv;b.onclick=()=>selLevel(lv,b);lvlBox.appendChild(b);});
function selLevel(lv,el){level=lv;region="";[...lvlBox.children].forEach(c=>c.classList.toggle('sel',c===el));
  $('lvlnote').textContent = lv==='Easy'?'Easy = famous world landmarks (Landmarks by City).':'Medium = lesser-known notable places (Notable Cities).';
  renderRegions();refreshActions();}
function renderRegions(){
  const rb=$('regions');rb.innerHTML='';
  const present=new Set(LEVELS[level].map(i=>i.c));
  ORDER.filter(r=>r==='All'||present.has(r)).forEach(r=>{const b=document.createElement('div');b.className='chip';b.textContent=r;b.onclick=()=>{region=r;[...rb.children].forEach(c=>c.classList.toggle('sel',c===b));refreshActions();};rb.appendChild(b);});
}
function refreshActions(){const ok=player&&level&&region;$('learnBtn').disabled=!ok;$('playBtn').disabled=!ok;}
$('learnBtn').onclick=()=>{prep();startLearn();};
$('playBtn').onclick=()=>{prep();startGame();};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function curR(){return vb[2]*PINK;}

function prep(){
  round = LEVELS[level].filter(i=>region==='All'||i.c===region).map(o=>Object.assign({},o));
  baseVB=(VIEWS[region]||VIEWS['World']).slice(); vb=baseVB.slice();
  $('ttl').textContent=level+' · '+region;
}

/* ---------- pins on a given svg ---------- */
function makePins(gid,clickable){
  const g=$(gid);g.innerHTML='';
  round.forEach((it,idx)=>{
    const c=document.createElementNS(SVGNS,'circle');c.setAttribute('class','pin');c.setAttribute('cx',it.x);c.setAttribute('cy',it.y);
    const hit=document.createElementNS(SVGNS,'circle');hit.setAttribute('class','hit');hit.setAttribute('cx',it.x);hit.setAttribute('cy',it.y);
    if(clickable) hit.addEventListener('click',e=>{e.stopPropagation();if(!panned)tap(idx);});
    g.appendChild(c);g.appendChild(hit);it['_'+gid]=c;it['_h'+gid]=hit;
  });
}
function sizePins(){const r=curR();round.forEach(it=>{['pins','lpins'].forEach(g=>{if(it['_'+g]){it['_'+g].setAttribute('r',r);it['_h'+g].setAttribute('r',r*2.4);}});});}

/* ---------- LEARN (auto play) ---------- */
let li=0,ltimer=null;
function startLearn(){
  mode='learn';makePins('lpins',false);
  $('lmap').setAttribute('viewBox',baseVB.join(' '));sizePins();
  queue=shuffle(round.map((_,i)=>i));li=0;show('learn');learnShow();playLearn(true);
}
function learnShow(){
  const it=round[queue[li]];
  round.forEach(x=>x._lpins.classList.remove('correct'));
  it._lpins.classList.add('correct');
  $('lclue').textContent=it.clue;
  $('lans').textContent='➔ '+it.n;
  $('lhint').innerHTML='<b>More:</b> '+it.hint;
  $('lprog').textContent=(li+1)+' / '+queue.length;
  pulse('lpins',it,'#34a853');
  $('lprev').disabled=li<=0;$('lnext').disabled=li>=queue.length-1;
}
function playLearn(on){clearInterval(ltimer);if(on){$('lplay').textContent='Pause';ltimer=setInterval(()=>{if(li<queue.length-1){li++;learnShow();}else{playLearn(false);}},4500);}else{$('lplay').textContent='Play';}}
$('lplay').onclick=()=>playLearn($('lplay').textContent==='Play');
$('lprev').onclick=()=>{if(li>0){li--;learnShow();playLearn(false);}};
$('lnext').onclick=()=>{if(li<queue.length-1){li++;learnShow();playLearn(false);}};
$('lstart').onclick=()=>{clearInterval(ltimer);startGame();};

/* ---------- GAME ---------- */
function startGame(){
  mode='game';makePins('pins',true);
  vb=baseVB.slice();setVB();
  pos=0;frontier=0;score=0;
  queue=shuffle(round.map((_,i)=>i));
  show('game');showClue();
}
function setVB(){$('map').setAttribute('viewBox',vb.map(v=>v.toFixed(1)).join(' '));sizePins();}
function active(){return pos===frontier&&frontier<queue.length;}
function curItem(){return round[queue[pos]];}
function showClue(){
  if(frontier>=queue.length)return finish();
  const it=curItem();
  $('clue').textContent=it.clue;
  $('hint').innerHTML='<b>Hint:</b> '+it.hint;
  $('prevBtn').disabled=pos<=0;$('nextBtn').disabled=pos>=frontier;
  $('score').textContent='Score '+score;
  if(active())$('prog').textContent='Clue '+(pos+1)+' / '+queue.length+'   ·   Tries left: '+(MAX-(it.tries||0));
  else $('prog').textContent='Clue '+(pos+1)+' / '+queue.length+'   ·   '+(it.state==='solved'?('answered (+'+it.pts+')'):'shown');
}
function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1300);}
function tap(idx){
  if(mode!=='game'||!active())return;
  const tgt=curItem();
  if(!tgt.tries) tgt.tries=0;
  if(idx===queue[pos]){
    tgt.state='solved';tgt._pins.classList.add('correct');
    const pts=[5,4,3][tgt.tries]||0;tgt.pts=pts;score+=pts;toast('✓ '+tgt.n+'   +'+pts);advance();
  } else {
    const w=round[idx];w._pins.classList.add('wrong');setTimeout(()=>w._pins.classList.remove('wrong'),450);
    tgt.tries++;
    if(tgt.tries>=MAX){tgt.state='reveal';tgt._pins.classList.add('reveal');pulse('pins',tgt,'#1f6fd6');tgt.pts=0;toast('Answer: '+tgt.n);setTimeout(advance,1500);}
    else showClue();
  }
}
function advance(){frontier++;if(frontier>=queue.length){setTimeout(finish,700);}else{pos=frontier;showClue();}}

function pulse(gid,it,color){
  const r0=curR();const ring=document.createElementNS(SVGNS,'circle');
  ring.setAttribute('cx',it.x);ring.setAttribute('cy',it.y);ring.setAttribute('r',r0);
  ring.setAttribute('fill','none');ring.setAttribute('stroke',color);ring.setAttribute('stroke-width','3');ring.setAttribute('vector-effect','non-scaling-stroke');
  $(gid).appendChild(ring);
  try{const a=ring.animate([{r:r0+'px',opacity:1},{r:(r0*3.4)+'px',opacity:0}],{duration:750,iterations:3});a.onfinish=()=>ring.remove();a.oncancel=()=>ring.remove();}

}
$('prevBtn').onclick=()=>{if(pos>0){pos--;showClue();}};
$('nextBtn').onclick=()=>{if(pos<frontier){pos++;showClue();}};
$('homeBtn').onclick=()=>show('home');
$('backBtn').onclick=()=>show('home');
$('againBtn').onclick=()=>{prep();startGame();};

/* ---------- leaderboard ---------- */
let MEM=[];
function getScores(){try{return JSON.parse(localStorage.getItem('geotap')||'[]');}catch(e){return MEM;}}
function putScore(rec){try{const a=getScores();a.push(rec);localStorage.setItem('geotap',JSON.stringify(a));}catch(e){MEM.push(rec);}}
function finish(){
  const total=queue.length,maxScore=total*5;
  const solved=round.filter(it=>it.state==='solved').length;
  const ratio=maxScore?score/maxScore:0,stars=ratio>=0.8?3:ratio>=0.5?2:1;
  const rec={name:player,level:level,region:region,score:score,max:maxScore,t:Date.now()};
  putScore(rec);
  $('stars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
  $('endScore').textContent=score+' / '+maxScore;
  $('endTitle').textContent=player+' found '+solved+' of '+total+'!';
  const rows=getScores().filter(r=>r.level===level).sort((a,b)=>b.score-a.score||a.t-b.t).slice(0,10);
  const body=$('lbBody');body.innerHTML='';
  rows.forEach((r,i)=>{const tr=document.createElement('tr');if(r.t===rec.t)tr.className='me';
    tr.innerHTML='<td>'+(i+1)+'</td><td>'+esc(r.name)+'</td><td>'+r.level+'</td><td>'+esc(r.region)+'</td><td class="r">'+r.score+'/'+r.max+'</td>';
    body.appendChild(tr);});
  show('end');
}
function esc(s){return (s+'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

  if(ptrs.size===2){const p=[...ptrs.values()];const d=Math.hypot(p[0].clientX-p[1].clientX,p[0].clientY-p[1].clientY);if(pinchD)zoomAt((p[0].clientX+p[1].clientX)/2,(p[0].clientY+p[1].clientY)/2,pinchD/d);pinchD=d;panned=true;return;}
  if(lastp){const s=uscale();if(Math.abs(e.clientX-lastp.x)+Math.abs(e.clientY-lastp.y)>3)panned=true;vb[0]-=(e.clientX-lastp.x)/s;vb[1]-=(e.clientY-lastp.y)/s;clamp();setVB();lastp={x:e.clientX,y:e.clientY};}});
function up(e){ptrs.delete(e.pointerId);if(ptrs.size<2)pinchD=0;if(ptrs.size===0)lastp=null;setTimeout(()=>{panned=false;},50);}
wrap.addEventListener('pointerup',up);wrap.addEventListener('pointercancel',up);

show(unlocked()?'home':'gate');
</script>
</body>
